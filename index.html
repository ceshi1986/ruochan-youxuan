<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>若禅优选 - 精选好物，源头直供</title>
<meta name="description" content="若禅优选，精选优质好物，厂家源头直供，让您以最优价格买到心仪商品">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#c8a96e;
  --primary-dark:#a88b4a;
  --bg:#f8f6f3;
  --card-bg:#fff;
  --text:#333;
  --text-light:#888;
  --red:#e74c3c;
  --green:#27ae60;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:24px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.header h1{font-size:28px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.header h1 span{color:var(--primary)}
.header p{font-size:13px;color:rgba(255,255,255,0.7);letter-spacing:1px}

/* Category Filter */
.filter-bar{padding:16px 20px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:82px;z-index:99;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{display:inline-block;padding:8px 20px;margin:0 4px;border-radius:20px;border:1.5px solid #ddd;background:#fff;color:#666;font-size:14px;cursor:pointer;transition:all 0.3s}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Product Grid */
.product-grid{max-width:1200px;margin:0 auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.product-card{background:var(--card-bg);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:transform 0.3s,box-shadow 0.3s}
.product-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,0.12)}
/* Image Gallery */
.img-gallery{position:relative;width:100%;aspect-ratio:1;overflow:hidden;background:#f0f0f0}
.img-gallery img{width:100%;height:100%;object-fit:cover;transition:opacity 0.3s}
.img-gallery .img-nav{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.img-gallery .img-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.5);border:none;cursor:pointer;padding:0;transition:background 0.3s}
.img-gallery .img-dot.active{background:#fff}
.img-gallery .img-arrows{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;justify-content:space-between;align-items:center;padding:0 4px;opacity:0;transition:opacity 0.3s;pointer-events:none}
.product-card:hover .img-arrows{opacity:1}
.img-gallery .img-arrow{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.4);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;pointer-events:auto;transition:background 0.2s}
.img-gallery .img-arrow:hover{background:rgba(0,0,0,0.7)}
.product-info{padding:16px}
.product-name{font-size:17px;font-weight:600;margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-desc{font-size:13px;color:var(--text-light);margin-bottom:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:60px}

/* Price Display */
.price-box{background:linear-gradient(135deg,#fff9f0,#fff5e6);border-radius:10px;padding:12px;margin-bottom:12px}
.price-main{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.price-label{font-size:11px;color:var(--text-light);min-width:48px}
.price-deal{font-size:26px;font-weight:700;color:var(--red)}
.price-deal .symbol{font-size:15px}
.price-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.price-market{font-size:13px;color:#aaa;text-decoration:line-through}
.price-cost{font-size:11px;color:var(--green);background:#e8f8f0;padding:2px 6px;border-radius:4px}

/* Want Button */
.want-btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;letter-spacing:1px}
.want-btn:hover{opacity:0.9;transform:scale(1.02)}
.want-btn:active{transform:scale(0.98)}

/* Empty State */
.empty-state{text-align:center;padding:80px 20px;color:var(--text-light)}
.empty-state .icon{font-size:64px;margin-bottom:16px}
.empty-state p{font-size:15px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:360px;width:100%;text-align:center;animation:modalIn 0.3s}
@keyframes modalIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:18px;margin-bottom:16px;color:var(--text)}
.modal .contact-item{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;background:#f8f8f8;border-radius:10px;margin-bottom:10px;font-size:15px}
.modal .contact-item .label{color:var(--text-light);font-size:13px}
.modal .contact-item .value{font-weight:600;color:var(--text);word-break:break-all}
.modal .close-btn{margin-top:16px;padding:10px 32px;border:1.5px solid #ddd;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;color:var(--text)}
.modal .close-btn:hover{background:#f5f5f5}

/* Footer */
.footer{background:#1a1a2e;color:rgba(255,255,255,0.6);text-align:center;padding:24px 20px;margin-top:40px;font-size:12px;line-height:1.8}
.footer .disclaimer{border-top:1px solid rgba(255,255,255,0.1);padding-top:16px;margin-top:16px;color:rgba(255,255,255,0.4)}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--text-light)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid #eee;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:640px){
  .header h1{font-size:22px}
  .product-grid{grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}
  .product-info{padding:12px}
  .product-name{font-size:14px}
  .product-desc{font-size:12px;min-height:48px}
  .price-deal{font-size:20px}
  .want-btn{font-size:13px;padding:10px}
}
</style>
</head>
<body>

<div class="header">
  <h1>若禅<span>优选</span></h1>
  <p>精选好物 · 源头直供 · 品质保障</p>
</div>

<div class="filter-bar" id="filterBar">
  <span class="filter-btn active" data-category="all">全部</span>
</div>

<div class="product-grid" id="productGrid">
  <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>📦 对这件商品感兴趣？</h3>
    <div id="modalContent"></div>
    <button class="close-btn" onclick="closeModal()">关闭</button>
  </div>
</div>

<footer class="footer">
  <div>若禅优选 &copy; 2026</div>
  <div class="disclaimer">
    ⚖️ 本网页仅负责产品展示，买卖双方自行交易，网页不承担任何买卖中出现的风险
  </div>
</footer>

<script>
const GITHUB_REPO = 'ceshi1986/ruochan-youxuan';
const GITHUB_BRANCH = 'main';
const PRODUCTS_URL = `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/data/products.json`;

let allProducts = [];
let currentCategory = 'all';

async function loadProducts() {
  try {
    const resp = await fetch(PRODUCTS_URL + '?t=' + Date.now());
    const data = await resp.json();
    allProducts = data.products || [];
    renderCategories();
    renderProducts();
  } catch (e) {
    document.getElementById('productGrid').innerHTML = 
      '<div class="empty-state"><div class="icon">📦</div><p>暂无商品，敬请期待</p></div>';
  }
}

function renderCategories() {
  const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '<span class="filter-btn active" data-category="all" onclick="filterCategory(\'all\')">全部</span>';
  cats.forEach(c => {
    bar.innerHTML += `<span class="filter-btn" data-category="${c}" onclick="filterCategory('${c}')">${c}</span>`;
  });
}

function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.category === cat);
  });
  renderProducts();
}

function showContactByIndex(allIdx) {
  const p = allProducts[parseInt(allIdx, 10)];
  if (!p) return;
  showContact(p.contact || {});
}

function renderProducts() {
  const grid = document.getElementById('productGrid');
  const filtered = currentCategory === 'all' ? allProducts.map((p,i) => ({p, allIdx: i})) : allProducts.map((p,i) => ({p, allIdx: i})).filter(x => x.p.category === currentCategory);
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>该分类暂无商品</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(({p, allIdx}) => {
    const images = getImages(p);
    const gallery = buildGallery(allIdx, images);
    return `
    <div class="product-card">
      ${gallery}
      <div class="product-info">
        <div class="product-name">${esc(p.name)}</div>
        <div class="product-desc">${esc(p.description || '')}</div>
        <div class="price-box">
          <div class="price-main">
            <span class="price-label">捡漏价</span>
            <span class="price-deal"><span class="symbol">¥</span>${p.dealPrice || '?'}</span>
          </div>
          <div class="price-row">
            <span class="price-label">市场价</span>
            <span class="price-market">¥${p.marketPrice || '?'}</span>
          </div>
          ${p.costPrice ? `<div class="price-row"><span class="price-label">成本价</span><span class="price-cost">¥${p.costPrice}</span></div>` : ''}
        </div>
        <button class="want-btn" data-idx="${allIdx}" onclick="showContactByIndex(this.dataset.idx)">🛒 我想要</button>
      </div>
    </div>
  `;
  }).join('');
}

function getImages(p) {
  if (p.images && p.images.length > 0) return p.images;
  if (p.image) return [p.image];
  return [];
}

function buildGallery(gid, images) {
  const ph = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><rect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2240%22>📦</text></svg>';
  if (images.length === 0) return `<div class="img-gallery"><img src="${ph}" alt=""></div>`;
  const imgs = images.map((s,i) => `<img src="${s}" alt="" style="display:${i===0?'block':'none'}">`).join('');
  const arrows = images.length > 1 ? `<div class="img-arrows"><button class="img-arrow" onclick="gNav(${gid},-1)">‹</button><button class="img-arrow" onclick="gNav(${gid},1)">›</button></div>` : '';
  const dots = images.length > 1 ? '<div class="img-nav">' + images.map((_,i) => `<button class="img-dot${i===0?' active':''}" onclick="gGo(${gid},${i})"></button>`).join('') + '</div>' : '';
  return `<div class="img-gallery" data-g="${gid}" data-n="${images.length}" data-c="0">${imgs}${arrows}${dots}</div>`;
}

function gGo(gid, idx) {
  const g = document.querySelector(`.img-gallery[data-g="${gid}"]`);
  if (!g) return;
  const n = parseInt(g.dataset.n), c = parseInt(g.dataset.current);
  const t = ((idx % n) + n) % n;
  if (t === c) return;
  g.querySelectorAll('img').forEach((im,i) => im.style.display = i===t?'block':'none');
  g.querySelectorAll('.img-dot').forEach((d,i) => d.classList.toggle('active', i===t));
  g.dataset.current = t;
}

function gNav(gid, dir) {
  const g = document.querySelector(`.img-gallery[data-g="${gid}"]`);
  if (!g) return;
  gGo(gid, parseInt(g.dataset.current) + dir);
}

function showContact(contact) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  let html = '';
  if (contact.wechat) {
    html += `<div class="contact-item"><span class="label">微信</span><span class="value">${esc(contact.wechat)}</span></div>`;
  }
  if (contact.phone) {
    html += `<div class="contact-item"><span class="label">电话</span><span class="value">${esc(contact.phone)}</span></div>`;
  }
  if (!html) html = '<p style="color:#999">暂无联系方式</p>';
  content.innerHTML = html;
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadProducts();
</script>
</body>
</html>
